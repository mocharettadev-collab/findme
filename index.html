<div class="humor-ticker-box">
    <div class="humor-content" id="joke-ticker">
        Memuat asupan humor absurd...
    </div>
</div>

<style>
    .humor-ticker-box {
        width: 100%;
        background: #222; /* Warna gelap agar kontras dengan header */
        color: #ffeb3b; /* Kuning cerah khas peringatan/info */
        overflow: hidden;
        white-space: nowrap;
        padding: 8px 0;
        font-family: 'Courier New', Courier, monospace; /* Font monospace biar makin absurd */
        font-size: 0.9rem;
        border-bottom: 1px solid #444;
    }

    .humor-content {
        display: inline-block;
        padding-left: 100%;
        animation: jalan-terus 25s linear infinite;
    }

    @keyframes jalan-terus {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100%); }
    }

    /* Berhenti saat kursor diarahkan (opsional, agar user bisa baca pelan-pelan) */
    .humor-ticker-box:hover .humor-content {
        animation-play-state: paused;
        cursor: pointer;
    }
</style>

<script>
    const tickerDisplay = document.getElementById('joke-ticker');
    
    async function fetchFreshJoke() {
        try {
            const resp = await fetch('https://candaan-api.vercel.app/api/text/random');
            const data = await resp.json();
            if(data.data) {
                tickerDisplay.innerText = "INFO ABSURD: " + data.data + " | Klik untuk ganti baru >>";
            }
        } catch (e) {
            tickerDisplay.innerText = "Gagal memuat humor, servernya lagi ikut audisi lawak...";
        }
    }

    // Panggil saat halaman siap
    fetchFreshJoke();

    // Ganti joke setiap 25 detik (sesuai durasi animasi)
    setInterval(fetchFreshJoke, 25000);

    // Tambahan: Klik teksnya untuk ganti joke secara manual
    tickerDisplay.addEventListener('click', () => {
        tickerDisplay.innerText = "Mencari lawakan lain...";
        fetchFreshJoke();
    });
</script>
